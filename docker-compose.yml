# version: '3.8'

services:
  db:
    image: mysql:8.4
    container_name: eventzen-db
    env_file:
      - ./eventzen/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  budget-db:
    image: postgres:16-alpine
    container_name: budget-tracking-db
    environment:
      POSTGRES_DB: budget_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - budget_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d budget_tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./eventzen
    container_name: eventzen-backend
    depends_on:
      db:
        condition: service_started
      budget-service:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - ./eventzen/.env

  frontend:
    build: ./frontend
    container_name: eventzen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  budget-service:
    build: ./budget-service
    container_name: budget-service
    depends_on:
      budget-db:
        condition: service_healthy
    env_file:
      - ./eventzen/.env
    environment:
      PORT: 8081
      DB_HOST: budget-db
      DB_PORT: 5432
      DB_NAME: budget_tracking
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_RETRY_COUNT: 12
      DB_RETRY_DELAY_MS: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  mysql_data:
  budget_postgres_data: