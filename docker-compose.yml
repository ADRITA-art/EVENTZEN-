# version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eventzen-db
    environment:
      SA_PASSWORD: "Adrita@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
  backend:
    build: ./eventzen
    container_name: eventzen-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://db:1433;databaseName=EVENTZEN;encrypt=false
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: Adrita@123

  frontend:
    build: ./frontend
    container_name: eventzen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mssql_data: