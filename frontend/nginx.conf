server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Never cache HTML entrypoint so clients always fetch latest bundle references.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Static assets can be cached aggressively because filenames are content-hashed.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }
}
