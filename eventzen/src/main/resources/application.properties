spring.config.import=optional:file:.env[.properties]

spring.application.name=eventzen
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.initializationFailTimeout=${SPRING_TIMEOUT}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
budget.service.base-url=${BUDGET_SERVICE_BASE_URL:http://localhost:4001}
auth.password.salt=${PASSWORD_SALT:dev-static-salt-change-me}